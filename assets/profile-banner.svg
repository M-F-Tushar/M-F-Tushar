    <text x="78" y="19" text-anchor="middle" fill="#C4B5FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">RESEARCH SPINE</text>
    <text x="78" y="36" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Machine Learning</text>
