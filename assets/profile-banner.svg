<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mahir Faysal Tusher learning-driven AI engineering banner</title>
  <desc id="desc">A dark GitHub profile banner showing a learning flywheel, repository cards, and AI engineering focus.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111F"/>
      <stop offset="0.45" stop-color="#0B2447"/>
      <stop offset="1" stop-color="#190E34"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="54" x2="1090" y2="322" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36BCF7"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102A4A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <path d="M0 287C118 235 233 239 353 282C500 335 651 334 802 268C950 204 1079 212 1200 251V360H0V287Z" fill="#36BCF7" opacity="0.08"/>
  <path d="M0 246C118 199 228 203 354 244C501 292 646 295 798 232C944 172 1072 182 1200 221" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

  <g opacity="0.16" stroke="#DCEBFF">
    <path d="M69 61H190M69 91H140M69 121H222M69 151H171"/>
    <path d="M984 66H1125M984 96H1066M984 126H1137M984 156H1092"/>
    <rect x="43" y="36" width="220" height="144" rx="18"/>
    <rect x="953" y="41" width="208" height="144" rx="18"/>
  </g>

  <g transform="translate(528 42) scale(0.76)" filter="url(#glow)">
    <circle cx="95" cy="95" r="82" fill="#081827" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="95" cy="95" r="48" fill="#0D1117" stroke="#36BCF7" stroke-opacity="0.55"/>
    <path d="M95 23C133 23 164 52 167 89" stroke="#36BCF7" stroke-width="5" stroke-linecap="round"/>
    <path d="M164 107C158 143 129 167 95 167" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
    <path d="M77 164C44 156 22 128 22 95" stroke="#8B5CF6" stroke-width="5" stroke-linecap="round"/>
    <path d="M29 68C40 42 65 23 95 23" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    <circle cx="95" cy="23" r="7" fill="#36BCF7"/>
    <circle cx="167" cy="95" r="7" fill="#22C55E"/>
    <circle cx="95" cy="167" r="7" fill="#8B5CF6"/>
    <circle cx="23" cy="95" r="7" fill="#F59E0B"/>
    <text x="95" y="89" text-anchor="middle" fill="#EAF6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">LEARN</text>
    <text x="95" y="113" text-anchor="middle" fill="#9DDCFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">BUILD</text>
  </g>

