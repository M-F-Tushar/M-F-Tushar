    <text x="110" y="19" text-anchor="middle" fill="#FCD34D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">COMMUNITY TRACK</text>
    <text x="110" y="36" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Open Source Collaboration</text>
  </g>

  <path d="M454 93H528" stroke="#36BCF7" stroke-width="2" stroke-dasharray="6 8" opacity="0.7"/>
  <path d="M673 93H746" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="6 8" opacity="0.7"/>
  <path d="M500 246H545" stroke="#22C55E" stroke-width="2" stroke-dasharray="6 8" opacity="0.7"/>
  <path d="M655 246H695" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6 8" opacity="0.7"/>

  <text x="600" y="213" text-anchor="middle" fill="#EAF6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="900" letter-spacing="0.5">
    Mahir Faysal Tusher
  </text>
  <text x="600" y="300" text-anchor="middle" fill="#BFD7EF" font-family="Fira Code, Consolas, monospace" font-size="16">
    student -> ML research learner -> AI engineer in progress
  </text>
  <text x="600" y="326" text-anchor="middle" fill="#88D8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
